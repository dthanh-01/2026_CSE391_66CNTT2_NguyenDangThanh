<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: Arial;
            background-color: white;
        }
        .container {
            border: 3px solid black;
            margin-bottom: 20px;
            width: 800px;
            padding: 20px;
            background: #e9e9e9;
        }
        .row{
            display: flex;
            gap: 20px;
        }
        .row input{
            flex: 1;
        }
        input, textarea {
            padding: 10px;
            border: 1px solid #ccc;
            width: 100%;
        }
        textarea {
            height: 150px;
            resize: none;
        }
        .bottom{
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
        }
        button {
            background: #5daedb;
            border: none;
            padding: 10px 20px;
            color: white;
            border-radius: 5px;
        }
    </style>
</head>
<body>
   <div class="container">
        <h3>Get in touch with us by filling contact form below</h3>
        <div class="row">
            <input type="text" placeholder="Your name">
            <input type="email" placeholder="Your email">
        </div>
        <div style="margin-top:15px;">
            <input type="text" placeholder="Subject">
        </div>
        <div style="margin-top:15px;">
            <textarea placeholder="Your message here..."></textarea>
        </div>
        <div class="bottom">
            <button>Send</button>
            <span>* Please fill all required form field, thanks!</span>
   </div>
</body> 
</html>
